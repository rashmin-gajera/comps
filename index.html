<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APL 524 — Quiz Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #4ff0b4;
    --accent2: #7c6fff;
    --danger: #ff5c6a;
    --warn: #ffb347;
    --text: #e8eaf0;
    --muted: #7a8299;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,240,180,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,240,180,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeDown 0.7s ease both;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    margin-top: 14px;
    letter-spacing: 1px;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    animation: fadeUp 0.6s ease both 0.2s;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
  }

  .card h2 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .card .subtitle {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  .range-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,240,180,0.1);
  }

  .range-info {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .range-info span {
    color: var(--accent2);
    font-weight: 700;
  }

  /* Quick select chips */
  .quick-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 32px;
  }

  .chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .chip:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(124,111,255,0.08);
  }

  .btn-start {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start:hover {
    background: #7affd4;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(79,240,180,0.25);
  }

  /* ── QUIZ SCREEN ── */
  #quiz-screen { display: none; animation: fadeUp 0.5s ease both; }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 36px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .quiz-meta .qnum {
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
  }

  .score-live {
    display: flex;
    gap: 16px;
  }

  .score-live .s-correct { color: var(--accent); }
  .score-live .s-wrong { color: var(--danger); }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
  }

  .q-type-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 14px;
    display: block;
  }

  .question-text {
    font-size: 1.08rem;
    font-weight: 600;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 28px;
  }

  .question-text code {
    font-family: var(--mono);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.88em;
    color: var(--warn);
  }

  .code-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 6px;
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--warn);
    line-height: 1.8;
    margin-bottom: 20px;
    white-space: pre-wrap;
    overflow-x: auto;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    font-family: var(--sans);
    font-size: 0.95rem;
    color: var(--text);
    transition: all 0.18s;
    line-height: 1.5;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(124,111,255,0.08);
    transform: translateX(3px);
  }

  .option-btn .opt-letter {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent2);
    background: rgba(124,111,255,0.15);
    border-radius: 4px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 1px;
    transition: all 0.18s;
  }

  .option-btn.correct {
    border-color: var(--accent) !important;
    background: rgba(79,240,180,0.1) !important;
    animation: flashCorrect 0.4s ease;
  }

  .option-btn.correct .opt-letter {
    background: var(--accent);
    color: #0d0f14;
  }

  .option-btn.wrong {
    border-color: var(--danger) !important;
    background: rgba(255,92,106,0.1) !important;
    animation: flashWrong 0.4s ease;
  }

  .option-btn.wrong .opt-letter {
    background: var(--danger);
    color: #fff;
  }

  .option-btn:disabled { cursor: default; }

  /* Feedback banner */
  .feedback {
    display: none;
    border-radius: 10px;
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 20px;
    animation: fadeUp 0.3s ease;
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(79,240,180,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  .feedback.wrong-fb {
    background: rgba(255,92,106,0.1);
    border: 1px solid var(--danger);
    color: #ff8f9a;
  }

  .feedback .fb-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 6px;
  }

  .btn-next {
    width: 100%;
    padding: 16px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .btn-next:hover {
    background: var(--accent);
    color: #0d0f14;
    transform: translateY(-1px);
  }

  .btn-next.show { display: block; animation: fadeUp 0.3s ease; }

  /* ── RESULTS SCREEN ── */
  #results-screen { display: none; animation: fadeUp 0.6s ease both; }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 36px;
    text-align: center;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid var(--border);
    margin: 0 auto 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .score-circle::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(var(--accent) var(--pct, 0%), var(--surface2) 0%);
    mask: radial-gradient(transparent 60%, black 61%);
    -webkit-mask: radial-gradient(transparent 60%, black 61%);
  }

  .score-pct {
    font-family: var(--mono);
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--accent);
    position: relative;
    z-index: 1;
  }

  .score-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }

  .results-card h2 {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .results-card .grade-msg {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    margin-bottom: 36px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 16px;
  }

  .stat-box .stat-val {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 700;
    display: block;
  }

  .stat-box .stat-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stat-box.s-correct .stat-val { color: var(--accent); }
  .stat-box.s-wrong .stat-val { color: var(--danger); }
  .stat-box.s-total .stat-val { color: var(--accent2); }

  /* Review list */
  .review-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 24px;
    transition: all 0.2s;
  }

  .review-toggle:hover { border-color: var(--accent2); color: var(--accent2); }

  .review-list { display: none; text-align: left; }
  .review-list.open { display: block; }

  .review-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .review-item.ri-correct { border-left: 3px solid var(--accent); }
  .review-item.ri-wrong { border-left: 3px solid var(--danger); }

  .ri-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .ri-qnum { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .ri-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; }
  .ri-badge.correct { background: rgba(79,240,180,0.15); color: var(--accent); }
  .ri-badge.wrong { background: rgba(255,92,106,0.15); color: var(--danger); }

  .ri-q { color: var(--text); margin-bottom: 6px; }
  .ri-your { font-family: var(--mono); font-size: 11px; }
  .ri-your.wrong-ans { color: var(--danger); }
  .ri-your.correct-ans { color: var(--accent); }
  .ri-correct-ans { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-top: 2px; }

  .btn-restart {
    width: 100%;
    padding: 18px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 28px;
  }

  .btn-restart:hover {
    background: #9b8fff;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(124,111,255,0.3);
  }

  /* Animations */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  @keyframes flashCorrect { 0%,100% { transform: scale(1); } 50% { transform: scale(1.01); } }
  @keyframes flashWrong { 0%,100% { transform: translateX(0); } 25%,75% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }

  @media (max-width: 560px) {
    .range-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr; }
    .card, .question-card, .results-card { padding: 24px 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">APL 524 · Programming Languages</div>
    <h1>Quiz Prep Station</h1>
    <p>// select range → answer questions → see results</p>
  </header>

  <!-- ── SETUP SCREEN ── -->
  <div id="setup-screen">
    <div class="card">
      <h2>Configure Your Quiz</h2>
      <p class="subtitle">// choose which questions to practice</p>

      <div class="range-row">
        <div class="field">
          <label>From Q#</label>
          <input type="number" id="from-input" value="1" min="1">
        </div>
        <div class="field">
          <label>To Q#</label>
          <input type="number" id="to-input" value="50" min="1">
        </div>
      </div>

      <p class="range-info">Question bank: <span id="total-count"></span> questions available</p>

      <div class="quick-row">
        <button class="chip" onclick="setRange(1,25)">Q1–25</button>
        <button class="chip" onclick="setRange(26,50)">Q26–50</button>
        <button class="chip" onclick="setRange(51,75)">Q51–75</button>
        <button class="chip" onclick="setRange(76,100)">Q76–100</button>
        <button class="chip" onclick="setRange(101,130)">Q101–130</button>
        <button class="chip" onclick="setRange(1,50)">First 50</button>
        <button class="chip" onclick="setRange(1, questions.length)">All Questions</button>
      </div>

      <button class="btn-start" onclick="startQuiz()">▶ Start Quiz</button>
    </div>
  </div>

  <!-- ── QUIZ SCREEN ── -->
  <div id="quiz-screen">
    <div class="quiz-meta">
      <span class="qnum" id="q-counter">Q 1 / 20</span>
      <div class="score-live">
        <span class="s-correct" id="live-correct">✓ 0</span>
        <span class="s-wrong" id="live-wrong">✗ 0</span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="prog-bar" style="width:0%"></div>
    </div>

    <div class="question-card">
      <span class="q-type-badge" id="q-type-badge">MCQ</span>
      <div class="question-text" id="q-text"></div>
      <div class="code-block" id="q-code" style="display:none"></div>
      <div class="options" id="options"></div>
    </div>

    <div class="feedback" id="feedback">
      <span class="fb-label" id="fb-label"></span>
      <span id="fb-detail"></span>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- ── RESULTS SCREEN ── -->
  <div id="results-screen">
    <div class="results-card">
      <div class="score-circle" id="score-circle">
        <span class="score-pct" id="score-pct">0%</span>
        <span class="score-label">SCORE</span>
      </div>
      <h2 id="result-title">Well done!</h2>
      <p class="grade-msg" id="grade-msg"></p>

      <div class="stats-row">
        <div class="stat-box s-correct">
          <span class="stat-val" id="res-correct">0</span>
          <span class="stat-name">Correct</span>
        </div>
        <div class="stat-box s-wrong">
          <span class="stat-val" id="res-wrong">0</span>
          <span class="stat-name">Wrong</span>
        </div>
        <div class="stat-box s-total">
          <span class="stat-val" id="res-total">0</span>
          <span class="stat-name">Total</span>
        </div>
      </div>

      <button class="review-toggle" onclick="toggleReview()">📋 Review Answers</button>
      <div class="review-list" id="review-list"></div>

      <button class="btn-restart" onclick="restart()">↺ New Quiz</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
//  QUESTION BANK — JSON
// ─────────────────────────────────────────────────────────────
const questions = [
  {
    "id": 1,
    "text": "COBOL is the only major compiled language that uses keywords rather than reserved words.",
    "type": "TF",
    "options": ["True", "False"],
    "answer": 1,
    "explanation": "False. FORTRAN is the only major compiled language that uses keywords rather than reserved words."
  },
  {
    "id": 2,
    "text": "In the C statement `int x = 1;` the value of x is bound at",
    "type": "MCQ",
    "options": ["Language design time", "Compile time", "Load time", "Run time", "None of the above"],
    "answer": 3,
    "explanation": "The literal value 1 is bound to memory at run time."
  },
  {
    "id": 3,
    "text": "Among the Programming domains mentioned in class is",
    "type": "MCQ",
    "options": ["Scientific applications", "Business applications", "Artificial intelligence", "Systems programming", "All of the above"],
    "answer": 4,
    "explanation": "All listed domains are programming domains."
  },
  {
    "id": 4,
    "text": "Programming language readability is adversely affected by the language",
    "type": "MCQ",
    "options": ["Being simple", "Supporting too many features", "Having multiplicity of features (redundancy)", "All of the above", "Only b and c"],
    "answer": 4,
    "explanation": "Too many features and redundancy reduce readability."
  },
  {
    "id": 5,
    "text": "Heap dynamic lifetime local variables are bound to memory cells before execution begins and remain bound until the program exits.",
    "type": "TF",
    "options": ["True", "False"],
    "answer": 1,
    "explanation": "False. Heap dynamic variables are created during execution."
  },
  {
    "id": 6,
    "text": "The lifetime of a variable is the time it is bound to a memory cell.",
    "type": "TF",
    "options": ["True", "False"],
    "answer": 0,
    "explanation": "True. Lifetime refers to the time a variable is bound to memory."
  },
  {
    "id": 7,
    "text": "One of the design motivations for Java was to do away with pointers even though Java is based on C++.",
    "type": "TF",
    "options": ["True", "False"],
    "answer": 0,
    "explanation": "True. Java removed explicit pointer manipulation."
  },
  {
    "id": 8,
    "text": "Nestable statically scoped languages allow",
    "type": "MCQ",
    "options": [
      "All variables of any subprogram to be visible to all others",
      "All variables defined at the same nesting level to be visible to each other",
      "All unmasked variables of a subprogram’s static parents to be visible to it",
      "None of the above"
    ],
    "answer": 2,
    "explanation": "Static scoping allows access to variables in static parent scopes."
  },
  {
    "id": 9,
    "text": "Keywords and reserved words are just two different names for identical concepts.",
    "type": "TF",

// ─────────────────────────────────────────────────────────────
//  APP STATE
// ─────────────────────────────────────────────────────────────
let quizQuestions = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let userAnswers = [];
let answered = false;

// Init
document.getElementById('total-count').textContent = questions.length;
document.getElementById('to-input').value = Math.min(50, questions.length);

function setRange(from, to) {
  document.getElementById('from-input').value = from;
  document.getElementById('to-input').value = Math.min(to, questions.length);
}

function startQuiz() {
  const fromVal = parseInt(document.getElementById('from-input').value);
  const toVal = parseInt(document.getElementById('to-input').value);
  const from = Math.max(1, fromVal);
  const to = Math.min(toVal, questions.length);

  if (isNaN(from) || isNaN(to) || from > to) {
    alert('Please enter a valid range.');
    return;
  }

  quizQuestions = questions.filter(q => q.id >= from && q.id <= to);

  if (quizQuestions.length === 0) {
    alert('No questions found in that range.');
    return;
  }

  currentIdx = 0; correct = 0; wrong = 0;
  userAnswers = new Array(quizQuestions.length).fill(null);

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';

  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;

  document.getElementById('q-counter').textContent = `Q ${currentIdx + 1} / ${total}`;
  document.getElementById('live-correct').textContent = `✓ ${correct}`;
  document.getElementById('live-wrong').textContent = `✗ ${wrong}`;
  document.getElementById('prog-bar').style.width = `${(currentIdx / total) * 100}%`;

  document.getElementById('q-type-badge').textContent = q.type === 'TF' ? 'TRUE / FALSE' : 'MULTIPLE CHOICE';
  document.getElementById('q-text').innerHTML = formatText(q.text);

  const codeEl = document.getElementById('q-code');
  if (q.codeBlock) {
    codeEl.textContent = q.codeBlock;
    codeEl.style.display = 'block';
  } else {
    codeEl.style.display = 'none';
  }

  const letters = ['A','B','C','D','E','F'];
  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').className = 'btn-next';
}

function formatText(text) {
  return text.replace(/`([^`]+)`/g, '<code>$1</code>');
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = quizQuestions[currentIdx];
  const isCorrect = idx === q.answer;
  userAnswers[currentIdx] = idx;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  if (isCorrect) {
    btns[idx].classList.add('correct');
    correct++;
    showFeedback(true, q.options[q.answer], q.explanation);
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    wrong++;
    showFeedback(false, q.options[q.answer], q.explanation);
  }

  document.getElementById('live-correct').textContent = `✓ ${correct}`;
  document.getElementById('live-wrong').textContent = `✗ ${wrong}`;

  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentIdx + 1 >= quizQuestions.length ? 'See Results →' : 'Next Question →';
  btnNext.className = 'btn-next show';
}

function showFeedback(isCorrect, correctAnswer, explanation) {
  const fb = document.getElementById('feedback');
  const label = document.getElementById('fb-label');
  const detail = document.getElementById('fb-detail');

  if (isCorrect) {
    fb.className = 'feedback show correct-fb';
    label.textContent = '✓ CORRECT!';
  } else {
    fb.className = 'feedback show wrong-fb';
    label.textContent = '✗ INCORRECT';
  }

  detail.textContent = explanation || ('Correct answer: ' + correctAnswer);
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQuestions.length) {
    showResults();
  } else {
    document.getElementById('quiz-screen').style.animation = 'none';
    document.getElementById('quiz-screen').offsetHeight;
    document.getElementById('quiz-screen').style.animation = '';
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const total = quizQuestions.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-circle').style.setProperty('--pct', pct + '%');

  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-total').textContent = total;

  let title, msg;
  if (pct >= 90) { title = '🏆 Excellent!'; msg = 'Outstanding performance! You\'re well prepared.'; }
  else if (pct >= 75) { title = '🎯 Great Job!'; msg = 'Strong understanding. A bit more practice and you\'ll ace it.'; }
  else if (pct >= 60) { title = '📚 Good Effort'; msg = 'Decent foundation. Focus on the missed questions.'; }
  else if (pct >= 40) { title = '💪 Keep Going'; msg = 'More review needed. Study the explanations carefully.'; }
  else { title = '📖 Keep Studying'; msg = 'Don\'t give up — review the material and try again!'; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('grade-msg').textContent = msg;

  buildReview();
}

function buildReview() {
  const list = document.getElementById('review-list');
  list.innerHTML = '';

  quizQuestions.forEach((q, i) => {
    const ua = userAnswers[i];
    const isC = ua === q.answer;
    const item = document.createElement('div');
    item.className = `review-item ${isC ? 'ri-correct' : 'ri-wrong'}`;

    const yourText = ua !== null ? q.options[ua] : 'Not answered';

    item.innerHTML = `
      <div class="ri-header">
        <span class="ri-qnum">Q${q.id}</span>
        <span class="ri-badge ${isC ? 'correct' : 'wrong'}">${isC ? '✓ CORRECT' : '✗ WRONG'}</span>
      </div>
      <div class="ri-q">${q.text.length > 120 ? q.text.substring(0,120)+'…' : q.text}</div>
      <div class="ri-your ${isC ? 'correct-ans' : 'wrong-ans'}">Your answer: ${yourText}</div>
      ${!isC ? `<div class="ri-correct-ans">Correct: ${q.options[q.answer]}</div>` : ''}
    `;
    list.appendChild(item);
  });
}

function toggleReview() {
  const list = document.getElementById('review-list');
  const btn = document.querySelector('.review-toggle');
  if (list.classList.contains('open')) {
    list.classList.remove('open');
    btn.textContent = '📋 Review Answers';
  } else {
    list.classList.add('open');
    btn.textContent = '▲ Hide Review';
  }
}

function restart() {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}
</script>
